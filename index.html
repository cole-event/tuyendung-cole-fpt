<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Ứng Viên - Vibe Coding</title>
    <!-- Sử dụng Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vibe: {
                            dark: '#0B0F19',
                            card: '#151C2C',
                            primary: '#8B5CF6',
                            secondary: '#06B6D4',
                            accent: '#F43F5E'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar cho phong cách Vibe */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B0F19; }
        ::-webkit-scrollbar-thumb { background: #8B5CF6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #06B6D4; }
        
        /* Animation cho Popup */
        .modal-enter { animation: fadeIn 0.3s ease-out forwards; }
        .modal-content-enter { animation: scaleUp 0.3s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-vibe-dark text-gray-200 font-sans min-h-screen">

    <!-- 1. Header / Navigation -->
    <nav class="flex flex-col md:flex-row items-center md:items-start p-6 bg-vibe-card border-b border-vibe-primary/30 shadow-lg shadow-vibe-primary/10">
        <!-- 2 Logo Ảnh -->
        <div class="flex items-center space-x-4 mb-4 md:mb-0">
            <!-- Thay src bằng link logo thực tế của bạn -->
            <img src="https://cole.edu.vn/wp-content/uploads/2026/02/logo-cole-white-width_2000.png" alt="Logo 1" class="h-12 w-auto object-contain">
            <img src="https://cdn.haitrieu.com/wp-content/uploads/2022/01/Logo-FPT.png" alt="Logo 2" class="h-12 w-auto object-contain">
        </div>
        <!-- Tiêu đề Ladipage -->
        <div class="md:ml-8 flex items-center h-12">
            <h1 class="text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-vibe-primary to-vibe-secondary text-center md:text-left">
                Danh sách các ứng viên phù hợp
            </h1>
        </div>
    </nav>

    <!-- 2. Main Content: Danh sách ứng viên -->
    <main class="container mx-auto px-4 py-8 max-w-5xl" id="candidate-list">
        <!-- Ứng viên sẽ được render vào đây bằng Javascript -->
    </main>

    <!-- 3. Nút nhận thông tin qua Email -->
    <div class="container mx-auto px-4 pb-12 flex justify-center">
        <button onclick="requestEmail()" class="px-8 py-4 rounded-xl bg-gradient-to-r from-blue-500 to-vibe-secondary hover:from-blue-600 hover:to-blue-400 text-white font-bold text-lg shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-1 flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
            Nhận thông tin các ứng viên qua email
        </button>
    </div>

    <!-- ================= MODALS ================= -->

    <!-- Modal 1: Từ chối (Lý do) -->
    <div id="rejectModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm modal-enter">
        <div class="bg-vibe-card border border-vibe-primary/50 rounded-2xl p-6 md:p-8 w-full max-w-lg mx-4 modal-content-enter shadow-2xl shadow-vibe-primary/20">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-vibe-accent">Vui lòng điền lý do từ chối!</h2>
                <button onclick="closeModal('rejectModal')" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <p class="text-sm text-gray-400 mb-6">Để cải thiện chất lượng CV, bạn vui lòng điền các lý do chưa phù hợp thật chi tiết!</p>
            
            <form id="rejectForm" onsubmit="submitReject(event)">
                <div class="mb-5">
                    <label class="block text-white font-semibold mb-3">1. Ứng viên này chưa phù hợp vì: <span class="text-xs text-gray-400 font-normal">(Có thể chọn nhiều)</span></label>
                    <div class="space-y-2 pl-2">
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" name="reason" value="Tuổi quá ít" class="form-checkbox h-5 w-5 text-vibe-accent rounded border-gray-600 bg-gray-800 focus:ring-vibe-accent focus:ring-offset-gray-900">
                            <span class="text-gray-300 group-hover:text-white transition">Tuổi quá ít</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" name="reason" value="Tuổi quá cao" class="form-checkbox h-5 w-5 text-vibe-accent rounded border-gray-600 bg-gray-800 focus:ring-vibe-accent focus:ring-offset-gray-900">
                            <span class="text-gray-300 group-hover:text-white transition">Tuổi quá cao</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" name="reason" value="Vị trí này đã có ứng viên khác phù hợp hơn" class="form-checkbox h-5 w-5 text-vibe-accent rounded border-gray-600 bg-gray-800 focus:ring-vibe-accent focus:ring-offset-gray-900">
                            <span class="text-gray-300 group-hover:text-white transition">Vị trí này đã có ứng viên khác phù hợp hơn</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="checkbox" name="reason" value="Kinh nghiệm chưa phù hợp" class="form-checkbox h-5 w-5 text-vibe-accent rounded border-gray-600 bg-gray-800 focus:ring-vibe-accent focus:ring-offset-gray-900">
                            <span class="text-gray-300 group-hover:text-white transition">Kinh nghiệm chưa phù hợp</span>
                        </label>
                        <!-- Thêm code html checkbox ở đây nếu cần thêm lý do -->
                    </div>
                </div>

                <div class="mb-6">
                    <label for="otherReason" class="block text-white font-semibold mb-2">2. Lý do khác:</label>
                    <textarea id="otherReason" name="otherReason" rows="3" class="w-full bg-gray-800 border border-gray-600 rounded-lg p-3 text-white focus:outline-none focus:border-vibe-accent focus:ring-1 focus:ring-vibe-accent transition placeholder-gray-500" placeholder="Nhập lý do khác tại đây..."></textarea>
                </div>

                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal('rejectModal')" class="px-5 py-2.5 rounded-lg border border-gray-600 text-gray-300 hover:bg-gray-800 transition">Hủy</button>
                    <button type="submit" class="px-5 py-2.5 rounded-lg bg-vibe-accent hover:bg-red-600 text-white font-semibold transition shadow-lg shadow-vibe-accent/30 flex items-center">
                        <span id="rejectBtnText">Hoàn Thành</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal 2: Xem thêm (Xem CV PDF) -->
    <div id="viewModal" class="fixed inset-0 z-40 hidden items-center justify-center bg-black/80 backdrop-blur-sm modal-enter">
        <div class="bg-vibe-card border border-vibe-secondary/50 rounded-2xl w-full max-w-5xl mx-4 h-[90vh] flex flex-col modal-content-enter shadow-2xl shadow-vibe-secondary/20">
            <!-- Header Modal -->
            <div class="flex justify-between items-center p-4 border-b border-gray-700">
                <h2 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-vibe-secondary to-blue-400" id="viewModalTitle">Chi tiết CV Ứng Viên</h2>
                <button onclick="closeModal('viewModal')" class="text-gray-400 hover:text-white text-3xl leading-none">&times;</button>
            </div>
            
            <!-- Body Modal (Iframe PDF) -->
            <div class="flex-grow p-2 bg-gray-900 relative">
                <!-- Vị trí gắn link Google Drive. Yêu cầu: Đổi /view thành /preview trong link Drive -->
                <iframe id="pdfIframe" src="" class="w-full h-full rounded border border-gray-700" allow="autoplay"></iframe>
                <div id="pdfLoading" class="absolute inset-0 flex items-center justify-center bg-gray-900 pointer-events-none">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-vibe-secondary"></div>
                </div>
            </div>

            <!-- Footer Modal (Buttons) -->
            <div class="p-4 border-t border-gray-700 flex justify-end space-x-4 bg-vibe-card rounded-b-2xl">
                <button id="modalBtnReject" onclick="handleRejectClick(currentCandidateId)" class="px-6 py-2.5 rounded-lg border border-vibe-accent text-vibe-accent hover:bg-vibe-accent hover:text-white transition font-semibold">
                    Từ chối
                </button>
                <button id="modalBtnAccept" onclick="toggleAcceptCandidate(currentCandidateId)" class="px-6 py-2.5 rounded-lg bg-gradient-to-r from-vibe-primary to-vibe-secondary hover:from-purple-500 hover:to-blue-400 text-white transition font-semibold shadow-lg shadow-vibe-primary/30">
                    Đồng ý
                </button>
            </div>
        </div>
    </div>

    <!-- Cấu hình và Logic Javascript -->
    <script>
        // ==========================================
        // CẤU HÌNH HỆ THỐNG
        // ==========================================
        
        // 1. GẮN LINK GOOGLE APPS SCRIPT VÀO ĐÂY
        const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFJ7av43xtRM9VRSF4zu6SdwMyhgNYMyynhMFzIMQIxpsAA0d4oko44Xy7-fN2r6Yt/exec"; 

        // ==========================================
        // 2. HƯỚNG DẪN THÊM ỨNG VIÊN MỚI
        // Để thêm người mới, hãy copy đoạn code trong thẻ /* ... */ bên dưới 
        // và dán vào bên trong mảng candidates = [ ... ] ở dưới. Dấu phẩy ngăn cách giữa các ứng viên.
        /*
        {
            id: "Mã_UV_Mới", // Phải khác nhau, ví dụ: UV003
            name: "Tên Ứng Viên",
            position: "Vị trí ứng tuyển",
            yob: 1995,
            age: 29,
            avatar: "Link_ảnh_avatar",
            desc: "Ưu điểm: Ghi chú vào đây...",
            pdfLink: "Link_Google_Drive_Phải_Có_Đuôi_/preview",
            status: "pending" // Luôn để pending
        },
        */

        // DỮ LIỆU ỨNG VIÊN
        let candidates = [
            {
                id: "UV001",
                name: "Nguyễn Tuấn Anh",
                position: "Senior Frontend Developer",
                yob: 1996,
                age: 28,
                avatar: "https://i.pravatar.cc/150?img=11",
                desc: "Ưu điểm: 5 năm kinh nghiệm làm việc với ReactJS, VueJS. Có khả năng tối ưu hóa UI/UX cực tốt. Tiếng Anh giao tiếp trôi chảy. Từng làm leader team 3 người.",
                // Lưu ý: Link Google Drive phải có đuôi /preview (không dùng /view)
                pdfLink: "https://drive.google.com/file/d/1O9m49-X_x-P_x_x_x_x_x/preview", // Thay bằng link thật
                status: "pending" // trạng thái: pending, rejected, accepted
            },
            {
                id: "UV002",
                name: "Trần Thị Minh Nguyệt",
                position: "Chuyên viên Marketing",
                yob: 1999,
                age: 25,
                avatar: "https://i.pravatar.cc/150?img=5",
                desc: "Ưu điểm: Sáng tạo, nhạy bén với trend mxh. Đã từng chạy các chiến dịch ngân sách lớn trên Tiktok và Facebook. Kỹ năng viết content xuất sắc.",
                pdfLink: "https://drive.google.com/file/d/1O9m49-X_x-P_x_x_x_x_x/preview", // Thay bằng link thật
                status: "pending"
            },
            {
                id: "Mã_UV_Mới", // Phải khác nhau, ví dụ: UV003
                name: "Tên Ứng Viên",
                position: "Vị trí ứng tuyển",
                yob: 1995,
                age: 29,
                avatar: "Link_ảnh_avatar",
                desc: "Ưu điểm: Ghi chú vào đây...",
                pdfLink: "Link_Google_Drive_Phải_Có_Đuôi_/preview",
                status: "pending" // Luôn để pending
            }
        ];

        // Biến toàn cục để lưu ứng viên đang thao tác
        let currentCandidateId = null;

        // ==========================================
        // LOGIC GIAO DIỆN (UI)
        // ==========================================

        // Render danh sách ứng viên ra màn hình
        function renderCandidates() {
            const listContainer = document.getElementById('candidate-list');
            listContainer.innerHTML = '';

            candidates.forEach(cand => {
                // Xác định trạng thái nút bấm
                const isRejected = cand.status === 'rejected';
                const isAccepted = cand.status === 'accepted';

                // Nút Từ chối: Đỏ nhạt nếu đã từ chối, viền hồng nếu chưa
                const rejectBtnClass = isRejected 
                    ? "bg-red-900/50 text-red-400 border border-red-500 hover:bg-red-900/80" 
                    : "border border-vibe-accent text-vibe-accent hover:bg-vibe-accent hover:text-white";
                
                // Nút Đồng ý: Xanh lá nếu đã đồng ý, Gradient nếu chưa
                const acceptBtnClass = isAccepted
                    ? "bg-green-600 text-white shadow-green-500/30 hover:bg-green-700"
                    : "bg-gradient-to-r from-vibe-primary to-vibe-secondary hover:from-purple-500 hover:to-blue-400 text-white shadow-vibe-primary/30";

                const cardHTML = `
                    <div class="bg-vibe-card border border-gray-800 rounded-2xl p-6 mb-6 shadow-xl hover:border-vibe-primary/50 transition duration-300">
                        <div class="flex flex-col md:flex-row gap-6">
                            <!-- Trái: Avatar -->
                            <div class="flex-shrink-0 flex justify-center md:justify-start">
                                <img src="${cand.avatar}" alt="Avatar ${cand.name}" class="w-24 h-24 md:w-32 md:h-32 rounded-full border-4 border-gray-700 object-cover shadow-lg">
                            </div>
                            
                            <!-- Phải: Thông tin -->
                            <div class="flex-grow">
                                <div class="flex flex-col md:flex-row md:justify-between md:items-start mb-2">
                                    <div>
                                        <h3 class="text-2xl font-bold text-white mb-1">${cand.name}</h3>
                                        <p class="text-vibe-secondary font-medium text-lg">${cand.position}</p>
                                    </div>
                                    <div class="mt-2 md:mt-0 bg-gray-800 px-4 py-1.5 rounded-full inline-block border border-gray-700">
                                        <span class="text-gray-300 text-sm">Năm sinh: ${cand.yob} (${cand.age} tuổi)</span>
                                    </div>
                                </div>
                                <div class="bg-gray-900/50 rounded-xl p-4 mt-3 border border-gray-800">
                                    <p class="text-gray-300 leading-relaxed text-sm">${cand.desc}</p>
                                </div>
                                
                                <!-- Nút hành động -->
                                <div class="mt-5 flex flex-wrap gap-3">
                                    <button 
                                        onclick="handleRejectClick('${cand.id}')" 
                                        class="px-5 py-2 rounded-lg transition font-semibold ${rejectBtnClass}">
                                        ${isRejected ? 'Đã từ chối (Nhấn để Hủy)' : 'Từ chối'}
                                    </button>
                                    
                                    <button 
                                        onclick="openViewModal('${cand.id}')"
                                        class="px-5 py-2 rounded-lg bg-gray-800 border border-gray-600 hover:bg-gray-700 text-white transition font-semibold">
                                        Xem thêm
                                    </button>
                                    
                                    <button 
                                        onclick="toggleAcceptCandidate('${cand.id}')" 
                                        class="px-5 py-2 rounded-lg transition font-semibold shadow-lg ${acceptBtnClass}">
                                        ${isAccepted ? 'Đã Đồng ý (Nhấn để Hủy)' : 'Đồng ý'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // ==========================================
        // LOGIC POPUP (MODALS) & NÚT BẤM (TOGGLE)
        // ==========================================

        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
            document.getElementById(modalId).classList.remove('flex');
            // Xóa src iframe để dọn dẹp bộ nhớ khi đóng
            if(modalId === 'viewModal') {
                document.getElementById('pdfIframe').src = '';
            }
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.remove('hidden');
            document.getElementById(modalId).classList.add('flex');
        }

        // 1. Xử lý khi bấm nút Từ chối (Toggle Hủy / Mở form)
        function handleRejectClick(id) {
            const cand = candidates.find(c => c.id === id);
            currentCandidateId = id;
            
            if (cand.status === 'rejected') {
                // Đang là Đã từ chối -> Chuyển về Pending
                cand.status = 'pending';
                renderCandidates();
                updateViewModalButtons(cand); 
                alert(`Đã HỦY TỪ CHỐI ứng viên: ${cand.name}`);
                
                sendDataToAppScript({ action: "cancel_reject", candidateId: cand.id, candidateName: cand.name });
            } else {
                // Đóng View Modal (nếu đang xem CV) để chuyển sang popup lý do cho mượt
                if(!document.getElementById('viewModal').classList.contains('hidden')) {
                    closeModal('viewModal');
                    setTimeout(() => {
                        document.getElementById('rejectForm').reset();
                        openModal('rejectModal');
                    }, 300);
                } else {
                    document.getElementById('rejectForm').reset();
                    openModal('rejectModal');
                }
            }
        }

        // 2. Xử lý khi bấm nút Đồng ý (Toggle Đồng ý / Hủy Đồng ý)
        function toggleAcceptCandidate(id) {
            const cand = candidates.find(c => c.id === id);
            
            if (cand.status === 'accepted') {
                // Đang Đồng ý -> Hủy Đồng ý
                cand.status = 'pending';
                alert(`Đã HỦY ĐỒNG Ý ứng viên: ${cand.name}`);
                sendDataToAppScript({ action: "cancel_accept", candidateId: cand.id, candidateName: cand.name });
            } else {
                // Chuyển sang Đồng ý
                cand.status = 'accepted';
                
                if(!document.getElementById('viewModal').classList.contains('hidden')) {
                    closeModal('viewModal');
                    setTimeout(() => alert(`Đã ghi nhận ĐỒNG Ý ứng viên: ${cand.name}`), 300);
                } else {
                    alert(`Đã ghi nhận ĐỒNG Ý ứng viên: ${cand.name}`);
                }
                sendDataToAppScript({ action: "accept", candidateId: cand.id, candidateName: cand.name });
            }
            
            renderCandidates();
            updateViewModalButtons(cand);
        }

        // 3. Hàm phụ trợ: Cập nhật trực tiếp nút trong popup Xem Thêm
        function updateViewModalButtons(cand) {
            const btnReject = document.getElementById('modalBtnReject');
            const btnAccept = document.getElementById('modalBtnAccept');
            if(!btnReject || !btnAccept) return;

            btnReject.className = "px-6 py-2.5 rounded-lg border font-semibold transition ";
            btnAccept.className = "px-6 py-2.5 rounded-lg font-semibold transition shadow-lg ";

            if (cand.status === 'rejected') {
                btnReject.innerText = 'Đã từ chối (Nhấn để hủy)';
                btnReject.classList.add("bg-red-900/50", "border-red-500", "text-red-400", "hover:bg-red-900/80");
                btnAccept.innerText = 'Đồng ý';
                btnAccept.classList.add("bg-gray-800", "text-gray-300", "border", "border-gray-600", "hover:border-gray-500");
            } else if (cand.status === 'accepted') {
                btnAccept.innerText = 'Đã Đồng ý (Nhấn để hủy)';
                btnAccept.classList.add("bg-green-600", "text-white", "shadow-green-500/30", "hover:bg-green-700");
                btnReject.innerText = 'Từ chối';
                btnReject.classList.add("bg-gray-800", "border-gray-600", "text-gray-300", "hover:border-vibe-accent", "hover:text-vibe-accent");
            } else {
                btnReject.innerText = 'Từ chối';
                btnReject.classList.add("border-vibe-accent", "text-vibe-accent", "hover:bg-vibe-accent", "hover:text-white");
                btnAccept.innerText = 'Đồng ý';
                btnAccept.classList.add("bg-gradient-to-r", "from-vibe-primary", "to-vibe-secondary", "text-white", "shadow-vibe-primary/30");
            }
        }

        // Mở popup Xem thêm (PDF)
        function openViewModal(id) {
            currentCandidateId = id;
            const cand = candidates.find(c => c.id === id);
            
            document.getElementById('viewModalTitle').innerText = `CV: ${cand.name} - ${cand.position}`;
            
            const iframe = document.getElementById('pdfIframe');
            const loading = document.getElementById('pdfLoading');
            loading.style.display = 'flex';
            
            iframe.onload = function() {
                loading.style.display = 'none';
            };
            
            iframe.src = cand.pdfLink;

            // Đồng bộ trạng thái 2 nút trong popup
            updateViewModalButtons(cand);

            openModal('viewModal');
        }

        // ==========================================
        // XỬ LÝ DATA & GỬI LÊN APPSCRIPT
        // ==========================================

        // Xử lý submit Form Từ chối
        function submitReject(event) {
            event.preventDefault();
            
            const cand = candidates.find(c => c.id === currentCandidateId);
            const formData = new FormData(event.target);
            
            const reasons = formData.getAll('reason'); // Mảng các checkbox
            const otherReason = formData.get('otherReason'); // Textarea

            if (reasons.length === 0 && otherReason.trim() === '') {
                alert("Vui lòng chọn ít nhất 1 lý do hoặc điền lý do khác!");
                return;
            }

            // Đổi trạng thái UI ngay lập tức
            cand.status = 'rejected';
            closeModal('rejectModal');
            renderCandidates(); 

            // Chuẩn bị data gửi đi
            const payload = {
                action: "reject",
                candidateId: cand.id,
                candidateName: cand.name,
                reasons: reasons.join(", "),
                otherReason: otherReason,
                timestamp: new Date().toISOString()
            };

            sendDataToAppScript(payload);
        }

        // Xử lý Yêu cầu Gửi Email
        function requestEmail() {
            if(!confirm("Bạn có chắc chắn muốn gửi thông tin đánh giá các ứng viên qua Email ngay bây giờ?")) return;

            // Thu thập trạng thái hiện tại của tất cả mọi người
            const summary = candidates.map(c => ({
                id: c.id,
                name: c.name,
                status: c.status
            }));

            const payload = {
                action: "send_email",
                timestamp: new Date().toISOString(),
                candidatesSummary: summary // Gửi list danh sách để AppScript biết gửi ai
            };

            sendDataToAppScript(payload);
            alert("Đã ghi nhận yêu cầu Gửi Email! Hệ thống sẽ xử lý và lưu dữ liệu mới nhất.");
        }

        // Hàm chung gửi data lên Google AppScript
        function sendDataToAppScript(data) {
            console.log("Đang gửi dữ liệu lên Google Sheet...", data);
            
            // NẾU CHƯA GẮN LINK, BÁO LỖI LOG NHƯNG UI VẪN CHẠY
            if(APPSCRIPT_URL.includes("YOUR_SCRIPT_ID_HERE")) {
                console.warn("Vui lòng gắn link Google AppScript vào biến APPSCRIPT_URL để lưu dữ liệu thật.");
                return;
            }

            fetch(APPSCRIPT_URL, {
                method: 'POST',
                // Sử dụng mode no-cors khi gọi AppScript từ domain khác để tránh lỗi CORS trên trình duyệt
                // Lưu ý: no-cors sẽ không nhận được response data trả về từ server
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(() => {
                console.log("Đã gửi request thành công (không xác minh được response do no-cors).");
            })
            .catch(error => {
                console.error("Lỗi khi gửi dữ liệu:", error);
            });
        }

        // ==========================================
        // KHỞI TẠO ỨNG DỤNG
        // ==========================================
        window.onload = function() {
            renderCandidates();
        };

    </script>
</body>
